apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-tracker-backend
  labels:
    app: aws-tracker-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aws-tracker-backend
  template:
    metadata:
      labels:
        app: aws-tracker-backend
    spec:
      containers:
      - name: aws-tracker-backend
        image: __IMAGE__
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@postgres-service:5432/awstracker"
        - name: AWS_REGION
          value: "us-east-1"
        - name: APP_ENV
          value: "production"
        - name: APP_NAME
          value: "AWS Infrastructure Tracker"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_SECRET_ACCESS_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
